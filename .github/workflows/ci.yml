name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow JSON files
        run: |
          for f in workflows/*.json; do
            python3 -c "import json; json.load(open('$f')); print(f'$f: valid JSON')"
          done
